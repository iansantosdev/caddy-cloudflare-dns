name: Build and Publish Caddy

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *" # Runs every day at 3 AM UTC

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Date
        id: date
        run: echo "tag=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

      - name: Build Caddy with Cloudflare module
        run: |
          echo "Building Caddy with the latest Cloudflare DNS plugin"
          ~/go/bin/xcaddy build --with github.com/caddy-dns/cloudflare

      - name: Create Dockerfile
        run: |
          cat <<EOF > Dockerfile
          FROM alpine:latest
          LABEL maintainer="${{ github.repository_owner }}"
          LABEL org.opencontainers.image.source="https://github.com/${{ github.repository }}"
          LABEL org.opencontainers.image.description="Caddy with Cloudflare DNS plugin"
          LABEL org.opencontainers.image.version="${{ steps.date.outputs.tag }}"

          COPY ./caddy /usr/bin/caddy

          RUN addgroup -g 1000 caddy && \
              adduser -u 1000 -G caddy -D -H caddy && \
              mkdir -p /data/caddy && \
              chown -R caddy:caddy /data/caddy && \
              mkdir -p /etc/caddy && \
              chown -R caddy:caddy /etc/caddy

          USER caddy
          WORKDIR /srv
          EXPOSE 80 443 443/udp 2019

          CMD ["/usr/bin/caddy", "run", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
          EOF

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/caddy-cloudflare:${{ steps.date.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/caddy-cloudflare:latest
